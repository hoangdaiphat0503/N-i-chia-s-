<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Dữ liệu Khảo sát</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Supabase Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        .admin-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 8px;
        }
        .admin-title {
            text-align: center;
            font-size: 2rem;
            color: var(--accent-color);
            margin-bottom: 30px;
        }
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            border: 1px solid rgba(197, 160, 89, 0.2);
        }
        .stat-number {
            font-size: 2rem;
            color: var(--accent-color);
            font-weight: bold;
        }
        .stat-label {
            color: var(--text-secondary);
            margin-top: 5px;
        }
        .data-table {
            width: 100%;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 8px;
            overflow: hidden;
        }
        .data-table table {
            width: 100%;
            border-collapse: collapse;
        }
        .data-table th {
            background: rgba(197, 160, 89, 0.2);
            color: var(--text-primary);
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }
        .data-table td {
            padding: 12px 15px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--text-secondary);
        }
        .data-table tr:hover {
            background: rgba(255, 255, 255, 0.05);
        }
        .btn-export {
            background: var(--accent-color);
            color: var(--bg-color);
            border: none;
            padding: 12px 24px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: 600;
            margin: 20px 0;
            transition: all 0.3s;
        }
        .btn-export:hover {
            background: #d4af5e;
            transform: translateY(-2px);
        }
        .empty-state {
            text-align: center;
            padding: 60px;
            color: var(--text-secondary);
        }
        .empty-state h3 {
            color: var(--accent-color);
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="overlay"></div>
    
    <div class="admin-container">
        <h1 class="admin-title">📊 Admin Panel - Dữ liệu Khảo sát</h1>
        
        <div class="stats-grid" id="statsGrid">
            <div class="stat-card">
                <div class="stat-number" id="totalResponses">0</div>
                <div class="stat-label">Tổng Phản hồi</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayResponses">0</div>
                <div class="stat-label">Hôm nay</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="popularTopic">-</div>
                <div class="stat-label">Chủ đề phổ biến</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="popularGoal">-</div>
                <div class="stat-label">Mục tiêu chính</div>
            </div>
        </div>
        
        <button class="btn-export" onclick="exportData()">📥 Export Dữ liệu (CSV)</button>
        <button class="btn-export" onclick="clearData()" style="background: #ff4444; margin-left: 10px;">🗑️ Xóa Dữ liệu</button>
        
        <div class="data-table" id="dataTable">
            <table>
                <thead>
                    <tr>
                        <th>Thời gian</th>
                        <th>Tên</th>
                        <th>Kỷ niệm</th>
                        <th>Chủ đề</th>
                        <th>Mục tiêu</th>
                        <th>Kiểu muốn</th>
                        <th>Khó khăn</th>
                    </tr>
                </thead>
                <tbody id="dataTableBody">
                    <!-- Dữ liệu sẽ được load vào đây -->
                </tbody>
            </table>
        </div>
        
        <div class="empty-state" id="emptyState" style="display: none;">
            <h3>Chưa có dữ liệu</h3>
            <p>Chưa có ai điền khảo sát. Hãy chia sẻ trang web để thu thập phản hồi!</p>
        </div>
    </div>

    <script>
        // Supabase Configuration - User's Project
        const SUPABASE_URL = 'https://zbqpkoisutwwzlnowlqa.supabase.co';
        const SUPABASE_ANON_KEY = 'sb_publishable_wr3ASCxG9W1ZqSbKHgy0bA_2xdiAeAP';
        
        // Khởi tạo Supabase client
        let supabase;
        try {
            supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
            console.log('✅ Admin: Supabase client initialized');
        } catch (error) {
            console.error('❌ Admin: Supabase initialization error:', error);
        }

        // Load dữ liệu khi trang được mở
        document.addEventListener('DOMContentLoaded', function() {
            loadData();
        });
        
        async function loadData() {
            try {
                // Lấy dữ liệu từ Supabase
                const { data: responses, error } = await supabase
                    .from('survey_responses')
                    .select('*')
                    .order('created_at', { ascending: false });
                
                if (error) {
                    console.error('Supabase fetch error:', error);
                    throw error;
                }
                
                console.log('✅ Admin: Loaded data from Supabase:', responses?.length || 0, 'responses');
                
                // Cập nhật thống kê
                updateStats(responses || []);
                
                // Hiển thị dữ liệu trong bảng
                displayData(responses || []);
                
            } catch (error) {
                console.error('Error loading data:', error);
                // Fallback to localStorage
                const data = localStorage.getItem('surveyResponses');
                const responses = data ? JSON.parse(data) : [];
                updateStats(responses);
                displayData(responses);
            }
        }
        
        function updateStats(responses) {
            // Tổng số phản hồi
            document.getElementById('totalResponses').textContent = responses.length;
            
            // Phản hồi hôm nay
            const today = new Date().toLocaleDateString('vi-VN');
            const todayCount = responses.filter(r => 
                new Date(r.timestamp).toLocaleDateString('vi-VN') === today
            ).length;
            document.getElementById('todayResponses').textContent = todayCount;
            
            // Chủ đề phổ biến
            const topicCounts = {};
            responses.forEach(r => {
                topicCounts[r.topic] = (topicCounts[r.topic] || 0) + 1;
            });
            const popularTopic = Object.keys(topicCounts).reduce((a, b) => 
                topicCounts[a] > topicCounts[b] ? a : b, Object.keys(topicCounts)[0]
            );
            document.getElementById('popularTopic').textContent = popularTopic || '-';
            
            // Mục tiêu phổ biến
            const goalCounts = {};
            responses.forEach(r => {
                goalCounts[r.goal] = (goalCounts[r.goal] || 0) + 1;
            });
            const popularGoal = Object.keys(goalCounts).reduce((a, b) => 
                goalCounts[a] > goalCounts[b] ? a : b, Object.keys(goalCounts)[0]
            );
            document.getElementById('popularGoal').textContent = popularGoal || '-';
        }
        
        function displayData(responses) {
            const tbody = document.getElementById('dataTableBody');
            const emptyState = document.getElementById('emptyState');
            
            if (responses.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            
            // Hiển thị 50 phản hồi gần nhất
            const recentResponses = responses.slice(-50).reverse();
            
            tbody.innerHTML = recentResponses.map(response => `
                <tr>
                    <td>${response.timestamp}</td>
                    <td><strong>${response.name}</strong></td>
                    <td>${response.memory}</td>
                    <td><span style="background: rgba(197, 160, 89, 0.2); padding: 4px 8px; border-radius: 4px;">${response.topic}</span></td>
                    <td>${response.goal}</td>
                    <td>${response.style}</td>
                    <td>${response.struggle}</td>
                </tr>
            `).join('');
        }
        
        function exportData() {
            const data = localStorage.getItem('surveyResponses');
            const responses = data ? JSON.parse(data) : [];
            
            if (responses.length === 0) {
                alert('Không có dữ liệu để export!');
                return;
            }
            
            // Tạo CSV
            const headers = ['Timestamp', 'Name', 'Memory', 'Topic', 'Goal', 'Style', 'Struggle'];
            const csvContent = [
                headers.join(','),
                ...responses.map(r => [
                    `"${r.timestamp}"`,
                    `"${r.name}"`,
                    `"${r.memory}"`,
                    `"${r.topic}"`,
                    `"${r.goal}"`,
                    `"${r.style}"`,
                    `"${r.struggle}"`
                ].join(','))
            ].join('\n');
            
            // Download file
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const link = document.createElement('a');
            const url = URL.createObjectURL(blob);
            link.setAttribute('href', url);
            link.setAttribute('download', `survey_data_${new Date().toISOString().split('T')[0]}.csv`);
            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        }
        
        function clearData() {
            if (confirm('Bạn có chắc muốn xóa tất cả dữ liệu? Hành động này không thể hoàn tác!')) {
                localStorage.removeItem('surveyResponses');
                loadData();
                alert('Đã xóa tất cả dữ liệu!');
            }
        }
        
        // Auto refresh mỗi 30 giây
        setInterval(loadData, 30000);
    </script>
</body>
</html>
